function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

// Neutral-palette colors for virtual (overlay) geographies. Chosen to read as
// "benchmark/context" rather than "primary" — darker slate tones that don't
// compete with the vivid GEO_COLORS used for user-selected places.
var VIRTUAL_GEO_COLORS = {
  combined: { bg: '#44403c', border: '#44403c', badge: 'AGG' },  // stone-700
  state:    { bg: '#475569', border: '#475569', badge: 'STATE' }, // slate-600
  national: { bg: '#334155', border: '#334155', badge: 'U.S.' }   // slate-700
};

// Returns the color object for any geography — virtual or real.
function geoColor(g) {
  if (g && g.virtual && g.kind && VIRTUAL_GEO_COLORS[g.kind]) {
    return VIRTUAL_GEO_COLORS[g.kind];
  }
  return GEO_COLORS[g && g.colorIdx != null ? g.colorIdx : 0];
}

function formatValue(val, format) {
  if (val === null || val === undefined || isNaN(val) || val < 0) return '—';
  if (format === 'count' || format === 'years') {
    return val.toLocaleString(undefined, { maximumFractionDigits: val < 100 ? 1 : 0 });
  }
  if (format === 'dollars') return '$' + Math.round(val).toLocaleString();
  if (format === 'pct_of' || format === 'pct_computed') return val.toFixed(1) + '%';
  if (format === 'minutes_computed') return val.toFixed(1) + ' min';
  if (format === 'lq') return val.toFixed(2);
  return val.toLocaleString();
}

function computeIndicator(ind, raw) {
  if (ind.format === 'count' || ind.format === 'dollars' || ind.format === 'years') {
    var v = parseFloat(raw[ind.varCode]);
    if (isNaN(v) || v < 0) return null;
    return v;
  }
  if (ind.format === 'pct_of') {
    var num = parseFloat(raw[ind.varCode]);
    var den = parseFloat(raw[ind.denomVar]);
    if (isNaN(num) || isNaN(den) || den <= 0 || num < 0) return null;
    return (num / den) * 100;
  }
  if (ind.format === 'pct_computed') {
    var sum = 0;
    for (var i = 0; i < ind.numerators.length; i++) {
      var v2 = parseFloat(raw[ind.numerators[i]]);
      if (isNaN(v2) || v2 < 0) return null;
      sum += v2;
    }
    var d2 = parseFloat(raw[ind.denomVar]);
    if (isNaN(d2) || d2 <= 0) return null;
    return (sum / d2) * 100;
  }
  if (ind.format === 'minutes_computed') {
    var agg = parseFloat(raw[ind.varCode]);
    var w = parseFloat(raw[ind.denomVar]);
    if (isNaN(agg) || isNaN(w) || w <= 0 || agg < 0) return null;
    return agg / w;
  }
  return null;
}

function getAllAcsVarCodes(indicators) {
  var set = {};
  for (var i = 0; i < indicators.length; i++) {
    var ind = indicators[i];
    if (ind.varCode) set[ind.varCode] = true;
    if (ind.denomVar) set[ind.denomVar] = true;
    if (ind.numerators) for (var j = 0; j < ind.numerators.length; j++) set[ind.numerators[j]] = true;
  }
  return Object.keys(set);
}

function chunkArray(arr, size) {
  var out = [];
  for (var i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

// GEO URL BUILDERS

function acsGeoParam(geoType, stateFips, countyFips, msaCode) {
  if (geoType === 'us') return '&for=us:1';
  if (geoType === 'state') return '&for=state:' + stateFips;
  if (geoType === 'county') return '&for=county:' + countyFips + '&in=state:' + stateFips;
  if (geoType === 'msa') return '&for=' + encodeURIComponent('metropolitan statistical area/micropolitan statistical area') + ':' + msaCode;
  return '';
}

function cbpGeoParam(geoType, stateFips, countyFips, msaCode) {
  if (geoType === 'us') return '&for=us:*';
  if (geoType === 'state') return '&for=state:' + stateFips;
  if (geoType === 'county') return '&for=county:' + countyFips + '&in=state:' + stateFips;
  if (geoType === 'msa') return '&for=' + encodeURIComponent('metropolitan statistical area/micropolitan statistical area') + ':' + msaCode;
  return '';
}

// ============================================================================
// ACS FETCH
// ============================================================================

function fetchAcsData(opts) {
  var vintage = opts.vintage, year = opts.year, geoType = opts.geoType;
  var stateFips = opts.stateFips, countyFips = opts.countyFips, msaCode = opts.msaCode;
  var varCodes = opts.varCodes, apiKey = opts.apiKey;
  var apiBase = ACS_VINTAGES[vintage].apiBase;
  var chunks = chunkArray(varCodes, 45);
  var merged = {};
  var nameOut = null;

  function doChunk(chunk, attempt) {
    var vars = ['NAME'].concat(chunk).join(',');
    var url = 'https://api.census.gov/data/' + year + '/' + apiBase + '?get=' + vars +
              acsGeoParam(geoType, stateFips, countyFips, msaCode);
    if (apiKey) url += '&key=' + encodeURIComponent(apiKey);

    return fetch(url).then(function(res) {
      if (res.ok) {
        return res.json().then(function(data) {
          if (!Array.isArray(data) || data.length < 2) throw new Error('Empty response');
          var headers = data[0], row = data[1];
          for (var i = 0; i < headers.length; i++) {
            if (headers[i] === 'NAME') { if (!nameOut) nameOut = row[i]; }
            else if (chunk.indexOf(headers[i]) !== -1) merged[headers[i]] = row[i];
          }
        });
      }
      if ((res.status === 429 || res.status >= 500) && attempt < 3) {
        return sleep(400 * attempt).then(function() { return doChunk(chunk, attempt + 1); });
      }
      return res.text().then(function(body) {
        throw new Error('ACS ' + res.status + ': ' + body.slice(0, 200));
      });
    }).catch(function(ex) {
      if (attempt < 3) {
        return sleep(400 * attempt).then(function() { return doChunk(chunk, attempt + 1); });
      }
      throw ex;
    });
  }

  var p = Promise.resolve();
  chunks.forEach(function(chunk) {
    p = p.then(function() { return doChunk(chunk, 1); }).then(function() { return sleep(80); });
  });
  return p.then(function() { return { name: nameOut, values: merged }; });
}

// ============================================================================
// CBP FETCH
// ============================================================================
// One CBP call per geography returns all NAICS rows. We request NAICS2017=*
// and filter client-side to just the sectors we need. This is far cheaper
// than one call per sector.

function fetchCbpData(opts) {
  var year = opts.year, geoType = opts.geoType;
  var stateFips = opts.stateFips, countyFips = opts.countyFips, msaCode = opts.msaCode;
  var apiKey = opts.apiKey;

  var url = 'https://api.census.gov/data/' + year + '/cbp' +
            '?get=EMP,ESTAB,NAICS2017_LABEL,NAME&NAICS2017=*' +
            cbpGeoParam(geoType, stateFips, countyFips, msaCode);
  if (apiKey) url += '&key=' + encodeURIComponent(apiKey);

  function tryOnce(attempt) {
    return fetch(url).then(function(res) {
      if (res.ok) return res.json();
      if ((res.status === 429 || res.status >= 500) && attempt < 3) {
        return sleep(500 * attempt).then(function() { return tryOnce(attempt + 1); });
      }
      return res.text().then(function(body) {
        throw new Error('CBP ' + res.status + ': ' + body.slice(0, 200));
      });
    }).catch(function(ex) {
      if (attempt < 3) return sleep(500 * attempt).then(function() { return tryOnce(attempt + 1); });
      throw ex;
    });
  }

  return tryOnce(1).then(function(data) {
    if (!Array.isArray(data) || data.length < 2) throw new Error('Empty CBP response');
    var headers = data[0];
    var iEmp = headers.indexOf('EMP');
    var iEst = headers.indexOf('ESTAB');
    var iCode = headers.indexOf('NAICS2017');
    var iName = headers.indexOf('NAME');
    var name = null;
    // Aggregate by sector-level code. CBP publishes manufacturing, retail,
    // and transportation/warehousing under the hyphenated codes "31-33",
    // "44-45", and "48-49" respectively — not as three/two separate rows.
    // We therefore accept both plain 2-digit codes AND the three known
    // hyphenated groupings, and as a safety net we also sum any stray
    // individual-component rows the API might return.
    var byCode = {}; // code string -> { emp, estab, hasData }
    for (var r = 1; r < data.length; r++) {
      var row = data[r];
      if (!name && iName !== -1) name = row[iName];
      var code = row[iCode] || '';
      var isTwoDigit = /^\d{2}$/.test(code);
      var isGrouped = code === '31-33' || code === '44-45' || code === '48-49';
      if (!isTwoDigit && !isGrouped && code !== '00') continue;
      var emp = parseFloat(row[iEmp]);
      var est = parseFloat(row[iEst]);
      if (!byCode[code]) byCode[code] = { emp: 0, estab: 0, hasData: false };
      if (!isNaN(emp) && emp >= 0) { byCode[code].emp += emp; byCode[code].hasData = true; }
      if (!isNaN(est) && est >= 0) { byCode[code].estab += est; byCode[code].hasData = true; }
    }
    // Build sector-level output. For each sector, try its primary code first
    // (e.g. "31-33"), and if that row is missing, fall back to summing the
    // individual queryCodes components ("31" + "32" + "33").
    var sectorOut = {};
    NAICS_SECTORS.forEach(function(s) {
      // Primary lookup: the sector code itself (may be grouped like "31-33")
      if (byCode[s.code] && byCode[s.code].hasData) {
        sectorOut[s.code] = { emp: byCode[s.code].emp, estab: byCode[s.code].estab };
        return;
      }
      // Fallback: sum individual queryCodes components
      var codes = s.queryCodes || [s.code];
      var emp = 0, est = 0, any = false;
      codes.forEach(function(c) {
        if (byCode[c] && byCode[c].hasData) {
          emp += byCode[c].emp;
          est += byCode[c].estab;
          any = true;
        }
      });

// ============================================================================
// LOCATION QUOTIENT
// ============================================================================

function computeLQ(localEmp, localTotal, usEmp, usTotal) {
  if (localEmp == null || localTotal == null || usEmp == null || usTotal == null) return null;
  if (localTotal <= 0 || usEmp <= 0 || usTotal <= 0) return null;
  var localShare = localEmp / localTotal;
  var usShare = usEmp / usTotal;
  if (usShare <= 0) return null;
  return localShare / usShare;
}

// ============================================================================
// CSV EXPORT
// ============================================================================

function toCSV(rows) {
  return rows.map(function(row) {
    return row.map(function(cell) {
      var s = String(cell == null ? '' : cell);
      if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',');
  }).join('\n');
}

function downloadCSV(filename, content) {
  var blob = new Blob([content], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function computeDelta(v1, v2, format) {
  if (v1 === null || v2 === null || v1 === undefined || v2 === undefined) return null;
  var isPct = format === 'pct_of' || format === 'pct_computed';
  if (isPct) return { type: 'pp', value: v2 - v1 };
  if (format === 'lq') return { type: 'abs', value: v2 - v1 };
  if (v1 === 0) return null;
  return { type: 'pct', value: ((v2 - v1) / v1) * 100 };
}

function hasSet(set, key) { return Object.prototype.hasOwnProperty.call(set, key); }

function formatDelta(delta) {
  if (!delta) return '—';
  var sign = delta.value > 0 ? '+' : '';
  if (delta.type === 'pp') return sign + delta.value.toFixed(1) + ' pp';
  if (delta.type === 'abs') return sign + delta.value.toFixed(2);
  return sign + delta.value.toFixed(1) + '%';
}

    if (showTime) {

        key: 'g' + idx, colSpan: 3,
        className: 'text-center py-2 px-3 font-normal border-b-2',
        style: { borderColor: color.border, borderStyle: g.virtual ? 'dashed' : 'solid' }
      },
        e('div', { className: 'flex items-center justify-center gap-1.5' },
          badge || e('span', { className: 'inline-block w-2 h-2 rounded-sm', style: { background: color.bg } }),
          e('span', { className: 'text-xs truncate max-w-[200px]', title: g.name }, g.name)
        )
      ));
    } else {
      headerCells.push(e('th', {
        key: 'g' + idx,
        className: 'text-right py-2.5 px-3 font-normal border-b-2 whitespace-nowrap',
        style: { borderColor: color.border, borderStyle: g.virtual ? 'dashed' : 'solid' }
      },
        e('div', { className: 'flex items-center justify-end gap-1.5' },
          badge || e('span', { className: 'inline-block w-2 h-2 rounded-sm', style: { background: color.bg } }),
          e('span', {
            className: 'mono text-[9px] uppercase tracking-widest truncate max-w-[160px]',
            style: { color: color.bg }, title: g.name
          }, g.name)
        )
      ));
    }
  });

  var subHeaderCells = null;
  if (showTime) {
    var sh = [e('th', { key: 'sh0', className: 'py-1.5 px-2 border-b hairline sticky-col' })];
    geos.forEach(function(g, idx) {
      sh.push(e('th', { key: 'sh-e-' + idx, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, earlierYear));
      sh.push(e('th', { key: 'sh-l-' + idx, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, laterYear));
      sh.push(e('th', { key: 'sh-d-' + idx, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, 'Δ'));
    });
    subHeaderCells = sh;
  }

  var section = props.section;
  var groupsDef = (section && section.groups) || {};
  // How many columns to span for group-header rows (indicator label col + one per geo, or ×3 if showTime)
  var totalCols = 1 + geos.length * (showTime ? 3 : 1);

  var bodyRows = [];
  var lastGroup = null;
  rows.forEach(function(row) {
    var gKey = row.indicator.group || null;
    // Emit a group-heading row whenever we enter a new (non-null) group
    if (gKey && gKey !== lastGroup) {
      var gDef = groupsDef[gKey] || { label: gKey, caption: null };
      bodyRows.push(e('tr', { key: 'gh-' + gKey, className: 'group-heading-row' },
        e('td', {
          colSpan: totalCols,
          className: 'pt-5 pb-1.5 px-2 border-b hairline bg-stone-100/40'
        },
          e('div', { className: 'flex items-baseline gap-2' },
            e('span', { className: 'mono text-[9px] uppercase tracking-widest text-stone-600' }, gDef.label),
            gDef.caption ? e('span', { className: 'text-[10px] text-stone-500 italic font-normal' }, gDef.caption) : null
          )
        )
      ));
    }
    // If we leave a group (row has no group but previous did), that's fine —
    // lastGroup simply resets. No separator needed.
    lastGroup = gKey;

    var indent = row.indicator.indent ? 'pl-6' : 'px-2';
    var rowBg = gKey ? 'bg-stone-50/30' : '';
    var cells = [e('td', {
      key: 'name',
      className: 'py-2.5 ' + indent + ' text-stone-800 border-b hairline whitespace-nowrap sticky-col ' + rowBg
    },
      row.indicator.indent
        ? e('span', { className: 'text-stone-400 mr-1.5' }, '—')
        : null,
      row.indicator.label
    )];
    geos.forEach(function(g, idx) {
      if (showTime) {
        var vE = aIsEarlier ? row.cells[idx + '-a'] : row.cells[idx + '-b'];
        var vL = aIsEarlier ? row.cells[idx + '-b'] : row.cells[idx + '-a'];
        var delta = computeDelta(vE, vL, row.indicator.format);
        cells.push(e('td', { key: 'e' + idx, className: 'py-2.5 px-3 mono text-right border-b hairline text-stone-900 ' + rowBg }, formatValue(vE, row.indicator.format)));
        cells.push(e('td', { key: 'l' + idx, className: 'py-2.5 px-3 mono text-right border-b hairline text-stone-900 ' + rowBg }, formatValue(vL, row.indicator.format)));
        cells.push(e('td', { key: 'd' + idx, className: 'py-2.5 px-3 text-right border-b hairline ' + rowBg }, e(DeltaCell, { delta: delta })));
      } else {
        cells.push(e('td', { key: 'v' + idx, className: 'py-2.5 px-3 mono text-right border-b hairline text-stone-900 ' + rowBg },
          formatValue(row.cells[idx + '-a'], row.indicator.format)));
      }
    });
    bodyRows.push(e.apply(null, [ 'tr', { key: row.indicator.id, className: 'hover:bg-stone-50/60' } ].concat(cells)));
  });

  return e('div', { className: 'overflow-x-auto scrollbar-thin' },
    e('table', { className: 'w-full text-xs border-separate', style: { borderSpacing: 0 } },
      e('thead', null,
        e.apply(null, [ 'tr', null ].concat(headerCells)),
        subHeaderCells ? e.apply(null, [ 'tr', null ].concat(subHeaderCells)) : null
      ),
      e.apply(null, [ 'tbody', null ].concat(bodyRows))
    )
  );
}

// ============================================================================
// DISTRIBUTION CHARTS (stacked horizontal bars for dist: true groups)
// ============================================================================
// For each section group flagged dist: true, renders one stacked horizontal
// bar per geography. When comparing across time, renders a bar per period
// (earlier on top, later on bottom) for each geography. Hovering any segment
// shows the indicator label and value via a native title tooltip.

// A qualitative palette that reads well on a light background. Chosen to be
// distinguishable at small segment sizes and print-friendly.
var DIST_PALETTE = [
  '#1e3a8a', // deep blue
  '#0f766e', // teal
  '#b45309', // amber
  '#7c2d12', // rust
  '#6d28d9', // violet
  '#86198f', // magenta
  '#365314'  // olive
];

function DistributionCharts(props) {
  var rows = props.rows;
  var r = props.results;
  var section = props.section;
  var groupsDef = (section && section.groups) || {};

  // Find every dist:true group that has rows in this section, preserving
  // indicator order so segment order matches the table.
  var groupOrder = [];
  var groupRows = {}; // groupKey -> [row]
  rows.forEach(function(row) {
    var gk = row.indicator.group;
    if (!gk) return;
    var gdef = groupsDef[gk];
    if (!gdef || !gdef.dist) return;
    if (!groupRows[gk]) { groupRows[gk] = []; groupOrder.push(gk); }
    groupRows[gk].push(row);
  });

  if (groupOrder.length === 0) return null;

  var showTime = r.periods.length > 1;
  var aIsEarlier = r.yearA <= (r.yearB || r.yearA);
  var earlierYear = showTime ? Math.min(r.yearA, r.yearB) : r.yearA;
  var laterYear   = showTime ? Math.max(r.yearA, r.yearB) : r.yearA;

  // Render one chart card per group
  var cards = groupOrder.map(function(gk) {
    var gdef = groupsDef[gk];
    var grows = groupRows[gk];

    // Determine canonical segment order for this group: sort indicators
    // largest-to-smallest by summed share across all geographies in the
    // earlier period. This order is then applied to the legend, every
    // geography's bar, and (for time comparisons) the later-period bar —
    // so segments stay visually anchored even as individual shares shift.
    var earlierKey = showTime ? (aIsEarlier ? 'a' : 'b') : 'a';
    var orderedRows = grows.slice().sort(function(rA, rB) {
      var sumA = 0, sumB = 0;
      r.geographies.forEach(function(_, gi) {
        var vA = rA.cells[gi + '-' + earlierKey];
        var vB = rB.cells[gi + '-' + earlierKey];
        if (typeof vA === 'number' && isFinite(vA) && vA >= 0) sumA += vA;
        if (typeof vB === 'number' && isFinite(vB) && vB >= 0) sumB += vB;
      });
      return sumB - sumA; // descending
    });

    // Legend swatches — in canonical (largest-first) order
    var legend = e('div', { className: 'flex flex-wrap gap-x-3 gap-y-1 mb-3 text-[10px]' },
      orderedRows.map(function(row, i) {
        return e('span', { key: row.indicator.id, className: 'inline-flex items-center gap-1.5 text-stone-700' },
          e('span', {
            className: 'inline-block w-2.5 h-2.5 rounded-sm flex-shrink-0',
            style: { background: DIST_PALETTE[i % DIST_PALETTE.length] }
          }),
          row.indicator.label
        );
      })
    );

    // For each geography, render either one bar (no-time) or two bars (time)
    var geoBars = r.geographies.map(function(g, gi) {
      var periodDefs = showTime
        ? [ { key: aIsEarlier ? 'a' : 'b', year: earlierYear },
            { key: aIsEarlier ? 'b' : 'a', year: laterYear   } ]
        : [ { key: 'a', year: r.yearA } ];

      var color = geoColor(g);

      return e('div', { key: gi, className: 'mb-4 last:mb-0' },
        // Geo name header
        e('div', { className: 'flex items-center gap-2 mb-1.5' },
          e('span', { className: 'inline-block w-2 h-2 rounded-sm', style: { background: color.bg } }),
          e('span', {
            className: 'mono text-[10px] uppercase tracking-widest',
            style: { color: color.bg }
          }, g.name)
        ),
        // One bar per period — segments laid out in canonical order
        periodDefs.map(function(pd) {
          var segs = orderedRows.map(function(row, i) {
            var v = row.cells[gi + '-' + pd.key];
            return {
              label: row.indicator.label,
              value: (typeof v === 'number' && isFinite(v) && v >= 0) ? v : 0,
              color: DIST_PALETTE[i % DIST_PALETTE.length]
            };
          });
          var sum = segs.reduce(function(s, x) { return s + x.value; }, 0);
          var normTo = sum > 95 ? sum : 100;

          return e('div', { key: pd.key, className: 'mb-1.5' },
            showTime ? e('div', { className: 'mono text-[9px] uppercase tracking-widest text-stone-500 mb-0.5' }, pd.year) : null,
            e('div', {
              className: 'relative w-full h-6 bg-stone-100 rounded-sm overflow-hidden flex',
              role: 'img',
              'aria-label': gdef.label + ' for ' + g.name + (showTime ? ' in ' + pd.year : '')
            },
              segs.map(function(s, i) {
                var pct = (s.value / normTo) * 100;
                if (pct <= 0) return null;
                var display = s.value.toFixed(1) + '%';
                return e('div', {
                  key: i,
                  className: 'h-full bar-grow flex items-center justify-center text-[9px] font-medium text-white overflow-hidden',
                  style: {
                    width: pct + '%',
                    background: s.color,
                    minWidth: pct > 0 ? '1px' : 0
                  },
                  title: s.label + ': ' + display
                },
                  pct >= 8 ? display : null
                );
              })
            )
          );
        })
      );
    });

    return e('div', {
      key: gk,
      className: 'border hairline bg-stone-50/60 rounded-sm p-4 mb-3 last:mb-0'
    },
      e('div', { className: 'flex items-baseline gap-2 mb-1' },
        e('span', { className: 'mono text-[10px] uppercase tracking-widest text-stone-600' }, gdef.label),
        gdef.caption ? e('span', { className: 'text-[10px] text-stone-500 italic' }, gdef.caption) : null
      ),
      legend,
      e('div', null, geoBars)
    );
  });

  return e('div', { className: 'mt-5' }, cards);
}

// ============================================================================
// SECTION NOTES (statistical disclaimers only)
// ============================================================================
// Kept minimal — only shows honest-necessary notes like the combined-median
// disclaimer when the combined overlay is active. Interpretive prose
// (biggest-mover / largest-gap / commute-mix) was removed to let the
// tables and charts speak for themselves.

function SectionNotes(props) {
  var rows = props.rows;
  var r = props.results;
  var notes = [];

  // Combined-geo median footnote: if the combined virtual is present and any
  // median/years/non-denominator indicator has null cells for it, flag that
  // medians cannot be aggregated.
  var hasCombined = r.geographies.some(function(g) { return g.kind === 'combined'; });
  if (hasCombined) {
    var combinedIdx = -1;
    for (var ci = 0; ci < r.geographies.length; ci++) {
      if (r.geographies[ci].kind === 'combined') { combinedIdx = ci; break; }
    }
    var anyMedianNulled = false;
    rows.forEach(function(row) {
      var ind = row.indicator;
      var isNonCombinable = (ind.format === 'dollars' || ind.format === 'years')
        && !ind.denomVar && !ind.numerators;
      if (!isNonCombinable) return;
      r.periods.forEach(function(pk) {
        if (row.cells[combinedIdx + '-' + pk] == null) anyMedianNulled = true;
      });
    });
    if (anyMedianNulled) {
      notes.push([
        e('span', { key: 'l', className: 'font-medium' }, 'Note: '),
        'Medians (income, age, home value, rent) cannot be validly reconstructed from aggregated data and are shown as “—” for the combined column.'
      ]);
    }
  }

  if (notes.length === 0) return null;

  return e('div', { className: 'mt-4 pl-3 border-l-2 border-stone-200 space-y-1.5' },
    notes.map(function(n, i) {
      return e.apply(null, [ 'div', { key: i, className: 'text-xs text-stone-700 leading-relaxed' } ].concat(n));
    })
  );
}

// ============================================================================
// JOBS SECTION (NAICS-structured)
// ============================================================================

function JobsSection(props) {
  var sr = props.sectionResult;
  var r = props.results;
  var showTime = r.periods.length > 1;
  var aIsEarlier = r.yearA <= (r.yearB || r.yearA);
  var latestKey = showTime ? (aIsEarlier ? 'b' : 'a') : 'a';

  // Split rows: totals and per-sector
  var totalRows = sr.rows.filter(function(row) { return row.indicator.naicsCode === '00'; });
  var sectorRowsFlat = sr.rows.filter(function(row) { return row.indicator.naicsCode !== '00'; });

  // Group per sector
  var bySector = {};
  sectorRowsFlat.forEach(function(row) {
    var c = row.indicator.naicsCode;
    if (!bySector[c]) bySector[c] = { label: row.indicator.naicsLabel, metrics: {} };
    bySector[c].metrics[row.indicator.metric] = row;
  });

  // Build per-geography "top 5" rankings for the latest period:
  //   - LQ: most-concentrated sectors relative to the US
  //   - Emp share: largest share of the geography's total employment
  var callouts = r.geographies.map(function(g, gi) {
    var cellKey = gi + '-' + latestKey;

    // --- Top 5 by LQ ---
    var rankedLq = NAICS_SECTORS.map(function(s) {
      var row = bySector[s.code] && bySector[s.code].metrics['lq'];
      if (!row) return null;
      var v = row.cells[cellKey];
      if (v == null || v <= 0) return null;
      return { code: s.code, label: s.label, v: v };
    }).filter(Boolean).sort(function(a, b) { return b.v - a.v; }).slice(0, 5);

    // --- Top 5 by share of total employment ---
    // Find this geography's total employment for the latest period
    var totalEmpRow = totalRows.filter(function(tr) { return tr.indicator.metric === 'emp'; })[0];
    var totalEmp = totalEmpRow ? totalEmpRow.cells[cellKey] : null;

    var rankedShare = [];
    if (totalEmp != null && totalEmp > 0) {
      rankedShare = NAICS_SECTORS.map(function(s) {
        var row = bySector[s.code] && bySector[s.code].metrics['emp'];
        if (!row) return null;
        var emp = row.cells[cellKey];
        if (emp == null || emp <= 0) return null;
        return { code: s.code, label: s.label, v: emp / totalEmp, emp: emp };
      }).filter(Boolean).sort(function(a, b) { return b.v - a.v; }).slice(0, 5);
    }

    return { g: g, topLq: rankedLq, topShare: rankedShare };
  });

  // Helper to render a single ranked bar list. `scaleMax` determines what
  // a "full" bar represents: for LQ we cap at 5; for share we cap at the
  // largest share in this geography's ranking so bars are always readable.
  function renderBars(items, color, formatFn, scaleMax) {
    if (items.length === 0) {
      return e('div', { className: 'text-[11px] text-stone-500 italic' }, 'No data.');
    }
    var max = scaleMax || items[0].v;
    if (max <= 0) max = 1;
    return e('div', { className: 'space-y-1.5' },
      items.map(function(t, k) {
        var barPct = Math.min(100, (t.v / max) * 100);
        return e('div', { key: k, className: 'flex items-baseline gap-2' },
          e('div', { className: 'flex-1 text-[11px] text-stone-800 leading-snug' }, t.label),
          e('div', {
            className: 'relative w-16 h-1.5 bg-stone-200 rounded-full overflow-hidden flex-shrink-0'
          },
            e('div', {
              className: 'absolute top-0 left-0 h-full bar-grow',
              style: { width: barPct + '%', background: color.bg }
            })
          ),
          e('div', { className: 'mono text-[11px] text-stone-900 w-10 text-right' }, formatFn(t))
        );
      })
    );
  }

  // Build the NAICS table: rows are sectors, columns are geos × metrics (or time periods if comparing)
  return e('div', null,
    e(SectionBlockHeader, { number: props.sectionNumber, section: sr.section }),

    // Totals table
    totalRows.length > 0
      ? e('div', { className: 'mb-6' },
          e('div', { className: 'mono text-[10px] uppercase tracking-widest text-stone-500 mb-2' }, 'All sectors, totals'),
          e(IndicatorTable, { rows: totalRows, results: r })
        )
      : null,

    // NAICS sector detail table
    e('div', { className: 'mb-6' },
      e('div', { className: 'mono text-[10px] uppercase tracking-widest text-stone-500 mb-2' },
        'By 2-digit NAICS sector' + (showTime ? ' (' + (aIsEarlier ? r.cbpYearB : r.cbpYearA) + ')' : '')),
      e(NaicsTable, { bySector: bySector, results: r, showTime: showTime, latestKey: latestKey })
    ),

    // Per-geography callouts: Top 5 LQ and Top 5 by employment share, side-by-side
    e('div', { className: 'mt-6 space-y-3' },
      callouts.map(function(co, i) {
        var color = geoColor(co.g);
        return e('div', {
          key: i,
          className: 'border hairline bg-stone-50/60 rounded-sm p-4'
        },
          // Geography header
          e('div', { className: 'flex items-center gap-2 mb-3' },
            e('span', { className: 'inline-block w-2 h-2 rounded-sm', style: { background: color.bg } }),
            e('div', { className: 'mono text-[10px] uppercase tracking-widest', style: { color: color.bg } },
              co.g.name)
          ),
          // Two-column inner grid: LQ | Emp share
          e('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-5' },
            // Left: Top 5 LQ
            e('div', null,
              e('div', { className: 'mono text-[10px] uppercase tracking-widest text-stone-400 mb-2' },
                'Top 5 by location quotient'),
              renderBars(co.topLq, color,
                function(t) { return t.v.toFixed(2); },
                5),
              e('div', { className: 'text-[10px] text-stone-500 mt-2 italic leading-relaxed' },
                'LQ > 1 = more concentrated than the U.S.')
            ),
            // Right: Top 5 by employment share
            e('div', null,
              e('div', { className: 'mono text-[10px] uppercase tracking-widest text-stone-400 mb-2' },
                'Top 5 by employment share'),
              renderBars(co.topShare, color,
                function(t) { return (t.v * 100).toFixed(1) + '%'; },
                co.topShare.length > 0 ? co.topShare[0].v : 1),
              e('div', { className: 'text-[10px] text-stone-500 mt-2 italic leading-relaxed' },
                'Share of this geography\u2019s total employment.')
            )
          )
        );
      })
    )
  );
}

// ============================================================================
// NAICS TABLE
// ============================================================================
// For non-time mode: columns are (Sector | geo1_emp | geo1_estab | geo1_lq | geo2_... )
// For time mode: we show only the latest year's emp/lq per geo plus Δemp to keep the table readable

function NaicsTable(props) {
  var bySector = props.bySector;
  var r = props.results;
  var geos = r.geographies;
  var showTime = props.showTime;
  var aIsEarlier = r.yearA <= (r.yearB || r.yearA);

  var headerCells = [e('th', {
    key: 'sec',
    className: 'text-left py-2.5 px-2 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b-2 hairline-strong whitespace-nowrap sticky-col'
  }, 'Sector')];

  geos.forEach(function(g, gi) {
    var color = geoColor(g);
    var span = showTime ? 3 : 3;
    var badge = (g.virtual && color.badge) ? e('span', {
      className: 'mono text-[8px] uppercase tracking-widest px-1 py-0.5 rounded-sm text-white',
      style: { background: color.bg }
    }, color.badge) : null;
    headerCells.push(e('th', {
      key: 'gh' + gi, colSpan: span,
      className: 'text-center py-2 px-3 font-normal border-b-2',
      style: { borderColor: color.border, borderStyle: g.virtual ? 'dashed' : 'solid' }
    },
      e('div', { className: 'flex items-center justify-center gap-1.5' },
        badge || e('span', { className: 'inline-block w-2 h-2 rounded-sm', style: { background: color.bg } }),
        e('span', { className: 'text-xs truncate max-w-[200px]', title: g.name }, g.name)
      )
    ));
  });

  var subHeader = [e('th', { key: 'sub0', className: 'py-1.5 px-2 border-b hairline sticky-col' })];
  geos.forEach(function(g, gi) {
    if (showTime) {
      subHeader.push(e('th', { key: 'shemp' + gi, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, 'Emp.'));
      subHeader.push(e('th', { key: 'shd' + gi, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, 'Δ Emp.'));
      subHeader.push(e('th', { key: 'shlq' + gi, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, 'LQ'));
    } else {
      subHeader.push(e('th', { key: 'shemp' + gi, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, 'Emp.'));
      subHeader.push(e('th', { key: 'shest' + gi, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, 'Estab.'));
      subHeader.push(e('th', { key: 'shlq' + gi, className: 'text-right py-1.5 px-3 mono text-[9px] uppercase tracking-widest text-stone-500 font-normal border-b hairline' }, 'LQ'));
    }
  });

  var bodyRows = NAICS_SECTORS.map(function(s) {
    var rec = bySector[s.code];
    if (!rec) {
      var emptyCells = [e('td', { key: 'name', className: 'py-2 px-2 text-[12px] text-stone-700 border-b hairline whitespace-nowrap sticky-col' },
        e('span', null, s.label),
        e('span', { className: 'mono text-[9px] text-stone-400 ml-2' }, s.code)
      )];
      geos.forEach(function(g, gi) {
        emptyCells.push(e('td', { key: 'e' + gi, colSpan: 3, className: 'py-2 px-3 text-center text-stone-300 border-b hairline text-xs' }, '—'));
      });
      return e.apply(null, ['tr', { key: s.code }].concat(emptyCells));
    }
    var cells = [e('td', { key: 'name', className: 'py-2 px-2 text-[12px] text-stone-800 border-b hairline whitespace-nowrap sticky-col' },
      e('span', null, s.label),
      e('span', { className: 'mono text-[9px] text-stone-400 ml-2' }, s.code)
    )];

    geos.forEach(function(g, gi) {
      var empRow = rec.metrics['emp'];
      var estRow = rec.metrics['estab'];
      var lqRow  = rec.metrics['lq'];
      if (showTime) {
        var vE = empRow ? (aIsEarlier ? empRow.cells[gi + '-a'] : empRow.cells[gi + '-b']) : null;
        var vL = empRow ? (aIsEarlier ? empRow.cells[gi + '-b'] : empRow.cells[gi + '-a']) : null;
        var d = computeDelta(vE, vL, 'count');
        var lqLatest = lqRow ? (aIsEarlier ? lqRow.cells[gi + '-b'] : lqRow.cells[gi + '-a']) : null;
        cells.push(e('td', { key: 'emp' + gi, className: 'py-2 px-3 mono text-right border-b hairline text-stone-900 text-[11px]' },
          formatValue(vL, 'count')));
        cells.push(e('td', { key: 'de' + gi, className: 'py-2 px-3 text-right border-b hairline' }, e(DeltaCell, { delta: d })));
        cells.push(e('td', { key: 'lq' + gi, className: 'py-2 px-3 mono text-right border-b hairline text-[11px] ' + lqClass(lqLatest) },
          formatValue(lqLatest, 'lq')));
      } else {
        var emp = empRow ? empRow.cells[gi + '-a'] : null;
        var est = estRow ? estRow.cells[gi + '-a'] : null;
        var lq = lqRow ? lqRow.cells[gi + '-a'] : null;
        cells.push(e('td', { key: 'emp' + gi, className: 'py-2 px-3 mono text-right border-b hairline text-stone-900 text-[11px]' },
          formatValue(emp, 'count')));
        cells.push(e('td', { key: 'est' + gi, className: 'py-2 px-3 mono text-right border-b hairline text-stone-700 text-[11px]' },
          formatValue(est, 'count')));
        cells.push(e('td', { key: 'lq' + gi, className: 'py-2 px-3 mono text-right border-b hairline text-[11px] ' + lqClass(lq) },
          formatValue(lq, 'lq')));
      }
    });

    return e.apply(null, ['tr', { key: s.code, className: 'hover:bg-stone-50/60' }].concat(cells));
  });

  return e('div', { className: 'overflow-x-auto scrollbar-thin' },
    e('table', { className: 'w-full text-xs border-separate', style: { borderSpacing: 0 } },
      e('thead', null,
        e.apply(null, [ 'tr', null ].concat(headerCells)),
        e.apply(null, [ 'tr', null ].concat(subHeader))
      ),
      e.apply(null, [ 'tbody', null ].concat(bodyRows))
    )
  );
}

function lqClass(v) {
  if (v == null || isNaN(v)) return 'text-stone-300';
  if (v >= 1.25) return 'text-emerald-700 font-medium';
  if (v < 0.75) return 'text-stone-500';
  return 'text-stone-900';
}

// ============================================================================
// CSV EXPORT
// ============================================================================

function downloadReportCSV(r) {
  if (!r || !r.sectionResults) return;

  var rows = [];
  var geos = r.geographies;
  var periods = r.periods;
  var mode = r.mode;

  function periodYearLabel(pk, source) {
    if (source === 'cbp') return pk === 'a' ? r.cbpYearA : r.cbpYearB;
    return pk === 'a' ? r.yearA : r.yearB;
  }

  rows.push(['Census Brief']);
  rows.push(['Generated', new Date().toISOString()]);
  rows.push(['Mode', mode]);
  rows.push(['Vintage', r.vintage]);
  rows.push(['Geographies'].concat(geos.map(function(g) { return g.name; })));
  rows.push([]);

  r.sectionResults.forEach(function(sr) {
    var section = sr.section;
    var isJobs = section.source === 'cbp';

    rows.push([]);
    rows.push(['=== ' + section.label + ' ===']);

    var colLabels = [];
    var colKeys = [];
    geos.forEach(function(g, gi) {
      periods.forEach(function(pk) {
        var yLabel = periodYearLabel(pk, isJobs ? 'cbp' : 'acs');
        var label = g.name + (periods.length > 1 ? ' (' + yLabel + ')' : '');
        colLabels.push(label);
        colKeys.push(gi + '-' + pk);
      });
    });

    rows.push(['Indicator'].concat(colLabels));

    sr.rows.forEach(function(row) {
      var ind = row.indicator;
      var outRow = [ind.label];
      colKeys.forEach(function(ck) {
        var v = row.cells[ck];
        if (v == null) {
          outRow.push('');
        } else if (typeof v === 'number') {
          if (ind.format === 'lq') outRow.push(v.toFixed(3));
          else outRow.push(v);
        } else {
          outRow.push(String(v));
        }
      });
      rows.push(outRow);
    });
  });

  var ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  var fname = 'census_brief_' + mode + '_' + ts + '.csv';
  downloadCSV(fname, toCSV(rows));
}

// ============================================================================
// MOUNT
// ============================================================================

try {
  var rootEl = document.getElementById('root');
  if (!rootEl) throw new Error('Root element not found');
  ReactDOM.createRoot(rootEl).render(e(CensusBrief));
} catch (err) {
  var root = document.getElementById('root') || document.body;
  root.innerHTML =
    '<div style="padding:40px;max-width:640px;margin:40px auto;font-family:system-ui;' +
    'border:1px solid #dc2626;background:#fef2f2;border-radius:8px">' +
    '<h2 style="color:#991b1b;margin:0 0 12px 0">Failed to start</h2>' +
    '<p style="color:#7f1d1d;margin:0 0 8px 0">' + String(err && err.message || err) + '</p>' +
    '<pre style="font-size:11px;color:#7f1d1d;white-space:pre-wrap;margin:0">' +
    String(err && err.stack || '') + '</pre></div>';
  console.error('Mount error:', err);
}

})();
</script>
